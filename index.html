<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1>To-Do</h1>
            <p class="subtitle">Organize your day, simply.</p>
        </header>

        <form id="todo-form" class="todo-form">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="오늘 할 일" autocomplete="off" required />
                <span id="selected-date-display" class="selected-date-display"></span>
                <div class="date-btn-wrapper" id="date-wrapper" title="마감 날짜 선택">
                    <input type="date" id="todo-date" aria-label="마감 날짜 선택" />
                    <i data-lucide="calendar" class="calendar-icon"></i>
                </div>
                <div class="color-picker-wrapper" id="add-color-wrapper">
                    <button type="button" class="action-btn color-palette-btn" title="색상 선택" id="add-color-btn" style="border-radius: 10px; padding: 0.4rem; color: #bbb;">
                        <i data-lucide="palette" width="18" height="18"></i>
                    </button>
                    <div class="color-dropdown" id="add-color-dropdown">
                        <button type="button" class="color-option white active" data-color="white"></button>
                        <button type="button" class="color-option pink" data-color="pink"></button>
                        <button type="button" class="color-option green" data-color="green"></button>
                        <button type="button" class="color-option blue" data-color="blue"></button>
                    </div>
                </div>
                <button type="button" class="important-toggle-btn" id="add-important-btn" title="중요 표시" style="padding: 0.4rem; color: #e0e0e0; transition: all 0.2s ease;">
                    <i data-lucide="flag" id="add-important-icon" width="18" height="18"></i>
                </button>
            </div>
            <button type="submit" class="add-btn" aria-label="할 일 추가">
                <i data-lucide="plus"></i>
            </button>
        </form>

        <div class="list-header">
            <h2 class="list-title">My Tasks</h2>
            <div class="list-controls">
                <button type="button" id="toggle-completed-btn" class="filter-btn" title="완료된 일정 숨기기">
                    <i data-lucide="check-circle-2" width="16" height="16"></i>
                    <span>완료 보임</span>
                </button>
                <div class="sort-wrapper">
                    <select id="sort-select" class="sort-select">
                        <option value="input">입력순</option>
                        <option value="important">중요도순</option>
                        <option value="date">날짜순</option>
                        <option value="color">컬러순</option>
                        <option value="alpha">가나다순</option>
                    </select>
                    <i data-lucide="chevron-down" class="sort-icon-down" width="14" height="14"></i>
                </div>
            </div>
        </div>

        <ul class="todo-list" id="todo-list">
            <!-- Todo items will be inserted here dynamically -->
        </ul>

        <footer class="app-footer">
            <p class="company-name">NegMong(송주엽)</p>
            <p class="company-slogan">Everything you need, All in one.</p>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
